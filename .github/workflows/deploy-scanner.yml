name: Deploy Modal scanner

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'scanner/**'
      - '.github/workflows/deploy-scanner.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install modal
          pip install -r scanner/requirements.txt

      - name: Modal deploy
        working-directory: scanner
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          if [ -z "$MODAL_TOKEN_ID" ] || [ -z "$MODAL_TOKEN_SECRET" ]; then
            echo "::error::Add MODAL_TOKEN_ID and MODAL_TOKEN_SECRET to GitHub repo Secrets (Settings → Secrets → Actions)."
            echo "Create tokens at https://modal.com/settings/tokens"
            exit 1
          fi
          modal deploy passive.py
          modal deploy app.py
